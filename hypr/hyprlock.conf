source = ~/dotfiles/catppuccin/conf/mocha.conf

general {
    hide_cursor = true
    fail_timeout = 200
}

auth {
    pam:enabled = true
    pam:module = hyprlock
}

animations {
    enabled = true
}

background {
    monitor =
    path = ~/dotfiles/hypr/backgrounds/walls-catppuccin-mocha/space.jpg# screenshot # del escritorio al momento de lock
    color = rgba(25, 20, 20, 1.0)
    # blur_passes = 0 # default
    # blur_size = 7 # default
}

# Para configurar la imagen de canciones de spotify o avatar de usuario
# Tambien se puede utilizar par crear efectos visuales pj detras del reloj
image {

}

input-field {
    monitor =
    size = 180, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    
    inner_color = none
    outer_color = $surface2 # $lavender
    font_color = $text
    fade_on_empty = false
    
    placeholder_text = <span foreground="##585b70">...</span>
    hide_input = false
    
    position = 0, -300
    halign = center
    valign = center
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
}
